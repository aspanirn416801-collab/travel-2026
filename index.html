<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 旅遊計畫 - 專業送審權限版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #1E293B; padding-bottom: 60px; }
        .info-box { border-radius: 12px; padding: 16px; border: 1px solid #E2E8F0; flex: 1; background: white; }
        input, textarea { background: transparent; border: none; outline: none; width: 100%; }
        .nav-active { background: #2563EB; color: white; border-radius: 8px; font-weight: bold; padding: 8px 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .nav-inactive { color: #64748B; font-weight: bold; padding: 8px 20px; cursor: pointer; border: 1px solid transparent; }
        .nav-inactive:hover { border-color: #CBD5E1; border-radius: 8px; }
        .shop-table th { font-size: 13px; color: #64748B; padding: 12px; text-align: left; background: #F8FAFC; }
        .shop-table td { padding: 10px; border-bottom: 1px solid #F1F5F9; background: white; }
        .map-btn { color: #3B82F6; cursor: pointer; transition: transform 0.2s; }
        .map-btn:hover { transform: scale(1.2); }
        .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .mode-locked { background: #FEE2E2; color: #991B1B; }
        .mode-edit { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="max-w-5xl mx-auto py-6 px-4">

    <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border border-slate-200">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter">PROJECT: 2026_TRAVEL</h1>
            <div id="auth-status" class="status-badge mode-locked">
                <i class="fas fa-lock"></i> 唯讀模式 (Read Only)
            </div>
        </div>
        <div id="auth-actions">
            <button onclick="unlockPrompt()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">
                <i class="fas fa-key mr-2"></i>解鎖編輯權限
            </button>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div id="day-nav" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
        <button onclick="checkAuth(() => addNewDay())" class="shrink-0 ml-4 bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-blue-700">
            + 新增天數
        </button>
    </div>

    <main id="main-content">讀取中...</main>

    <script>
        const supabaseUrl = 'https://qmmtyfdidiecklhmpfbq.supabase.co';
        const supabaseKey = 'sb_publishable_jVcE6vMZzu1L24w6hOZYcw_QY6FqY4Z';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_PWD = "202604"; 
        let isEditMode = false;
        let trips = [];
        let currentIdx = 0;

        // 權限解鎖視窗
        function unlockPrompt() {
            const pwd = prompt("請輸入送審核准密碼以啟動編輯模式：");
            if (pwd === ADMIN_PWD) {
                isEditMode = true;
                document.getElementById('auth-status').innerHTML = '<i class="fas fa-unlock"></i> 編輯模式 (Edit Mode)';
                document.getElementById('auth-status').className = 'status-badge mode-edit';
                document.getElementById('auth-actions').innerHTML = `
                    <button onclick="lockMode()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-600">
                        <i class="fas fa-sign-out-alt mr-2"></i>結束編輯並鎖定
                    </button>
                `;
                render();
            } else if (pwd !== null) {
                alert("密碼錯誤，請聯繫系統管理員。");
            }
        }

        function lockMode() {
            isEditMode = false;
            document.getElementById('auth-status').innerHTML = '<i class="fas fa-lock"></i> 唯讀模式 (Read Only)';
            document.getElementById('auth-status').className = 'status-badge mode-locked';
            document.getElementById('auth-actions').innerHTML = `
                <button onclick="unlockPrompt()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700">
                    <i class="fas fa-key mr-2"></i>解鎖編輯權限
                </button>
            `;
            render();
        }

        function checkAuth(callback) {
            if (isEditMode) callback();
            else alert("⚠️ 當前為「唯讀模式」，請先點擊上方按鈕解鎖編輯權限。");
        }

        async function loadData() {
            const { data } = await _supabase.from('trips').select('*').order('id', { ascending: true });
            trips = data || [];
            render();
        }

        async function updateField(id, field, val) {
            if (!isEditMode) return;
            await _supabase.from('trips').update({ [field]: val }).eq('id', id);
        }

        async function saveList(id, listName, listData, shouldSort = false) {
            if (!isEditMode) return;
            if (shouldSort && listName === 'stops') {
                listData.sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00"));
            }
            await _supabase.from('trips').update({ [listName]: listData }).eq('id', id);
            loadData();
        }

        function forceMap(val) {
            if(!val || val.trim() === "") return;
            window.open(`https://www.google.com/maps/search/${encodeURIComponent(val)}`, '_blank');
        }

        async function addNewDay() {
            const { data } = await _supabase.from('trips').insert([{ day: `Day ${trips.length + 1}`, stops: [], shop_list: [] }]).select();
            currentIdx = trips.length; 
            loadData();
        }

        async function deleteCurrentDay() {
            if(!confirm("確定刪除整天？")) return;
            await _supabase.from('trips').delete().eq('id', trips[currentIdx].id);
            currentIdx = 0;
            loadData();
        }

        function render() {
            const nav = document.getElementById('day-nav');
            const content = document.getElementById('main-content');
            if (trips.length === 0) { content.innerHTML = "無行程資料。"; return; }

            nav.innerHTML = trips.map((t, i) => `
                <button onclick="currentIdx=${i}; render();" class="${i === currentIdx ? 'nav-active' : 'nav-inactive'}">
                    ${t.day || 'Day'}
                </button>
            `).join('');

            const t = trips[currentIdx];
            const stops = Array.isArray(t.stops) ? t.stops : [];
            const shops = Array.isArray(t.shop_list) ? t.shop_list : [];

            content.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex-1">
                            <input class="text-3xl font-black text-slate-800" value="${t.day || ''}" 
                                onblur="updateField(${t.id}, 'day', this.value)" ${!isEditMode ? 'readonly' : ''}>
                            <input type="date" class="text-slate-400 font-bold mt-1" value="${t.date || ''}" 
                                onchange="updateField(${t.id}, 'date', this.value)" ${!isEditMode ? 'disabled' : ''}>
                        </div>
                        ${isEditMode ? `<button onclick="deleteCurrentDay()" class="text-red-400 hover:text-red-600 text-sm font-bold"><i class="fas fa-trash-alt mr-1"></i>刪除此日</button>` : ''}
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="info-box border-l-4 border-l-blue-500">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Target Destination</span>
                            <div class="flex items-center gap-2 mt-1">
                                <input id="dest-${t.id}" class="text-lg font-bold" value="${t.dest || ''}" 
                                    onblur="updateField(${t.id}, 'dest', this.value)" placeholder="目的地" ${!isEditMode ? 'readonly' : ''}>
                                <i onclick="forceMap(document.getElementById('dest-${t.id}').value)" class="fas fa-directions map-btn text-blue-500"></i>
                            </div>
                        </div>
                        <div class="info-box border-l-4 border-l-orange-500">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Base Hotel</span>
                            <div class="flex items-center gap-2 mt-1">
                                <input id="hotel-${t.id}" class="text-lg font-bold" value="${t.hotel || ''}" 
                                    onblur="updateField(${t.id}, 'hotel', this.value)" placeholder="下榻飯店" ${!isEditMode ? 'readonly' : ''}>
                                <i onclick="forceMap(document.getElementById('hotel-${t.id}').value)" class="fas fa-hotel map-btn text-orange-500"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <div class="flex justify-between items-center mb-6 border-b pb-2">
                            <h3 class="font-black text-slate-800 tracking-tighter"><i class="fas fa-list-ul mr-2 text-blue-500"></i>ITINERARY 行程表</h3>
                            ${isEditMode ? `<button onclick="addStop(${t.id})" class="text-blue-600 text-xs font-bold">+ 新增景點</button>` : ''}
                        </div>
                        <div class="space-y-6">
                            ${stops.map((s, i) => `
                                <div class="relative pl-4 border-l-2 border-slate-100">
                                    <div class="flex items-center gap-3 mb-1">
                                        <input type="time" class="w-24 font-bold text-blue-600" value="${s.time || '09:00'}" 
                                            onblur="stops[${i}].time=this.value; saveList(${t.id}, 'stops', stops, true)" ${!isEditMode ? 'readonly' : ''}>
                                        <input id="stop-${i}" class="font-bold flex-1" value="${s.place || ''}" 
                                            onblur="stops[${i}].place=this.value; saveList(${t.id}, 'stops', stops, false)" placeholder="地點" ${!isEditMode ? 'readonly' : ''}>
                                        <i onclick="forceMap(document.getElementById('stop-${i}').value)" class="fas fa-map-marker-alt map-btn text-slate-300"></i>
                                        ${isEditMode ? `<i onclick="deleteStop(${t.id}, ${i})" class="fas fa-times text-slate-300 hover:text-red-500 cursor-pointer"></i>` : ''}
                                    </div>
                                    <textarea class="text-xs text-slate-400 p-1" onblur="stops[${i}].note=this.value; saveList(${t.id}, 'stops', stops, false)" 
                                        placeholder="備註..." ${!isEditMode ? 'readonly' : ''}>${s.note || ''}</textarea>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 overflow-hidden">
                        <div class="flex justify-between items-center mb-6 border-b pb-2">
                            <h3 class="font-black text-slate-800 tracking-tighter"><i class="fas fa-shopping-cart mr-2 text-orange-500"></i>SHOPPING 購物清單</h3>
                            ${isEditMode ? `<button onclick="addShop(${t.id})" class="text-orange-500 text-xs font-bold">+ 新增項目</button>` : ''}
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full shop-table">
                                <thead>
                                    <tr><th width="100">地區</th><th>物品</th><th width="40">量</th><th width="40"></th></tr>
                                </thead>
                                <tbody>
                                    ${shops.map((item, i) => `
                                        <tr>
                                            <td>
                                                <div class="flex items-center gap-1">
                                                    <input id="shop-loc-${i}" class="text-xs text-slate-400" value="${item.store || ''}" 
                                                        onblur="shops[${i}].store=this.value; saveList(${t.id}, 'shop_list', shops)" placeholder="地區" ${!isEditMode ? 'readonly' : ''}>
                                                    <i onclick="forceMap(document.getElementById('shop-loc-${i}').value)" class="fas fa-map-pin text-[10px] map-btn opacity-50"></i>
                                                </div>
                                            </td>
                                            <td><input class="text-sm font-bold" value="${item.item || ''}" onblur="shops[${i}].item=this.value; saveList(${t.id}, 'shop_list', shops)" ${!isEditMode ? 'readonly' : ''}></td>
                                            <td><input type="number" class="text-xs w-8 text-center" value="${item.qty || 1}" onblur="shops[${i}].qty=this.value; saveList(${t.id}, 'shop_list', shops)" ${!isEditMode ? 'readonly' : ''}></td>
                                            <td>${isEditMode ? `<i onclick="deleteShop(${t.id}, ${i})" class="fas fa-trash text-slate-200 hover:text-red-400 cursor-pointer text-xs"></i>` : ''}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        async function addStop(id) {
            let t = trips[currentIdx];
            let stops = [...t.stops];
            stops.push({ time: "09:00", place: "", note: "" });
            await saveList(id, 'stops', stops, false);
        }

        async function deleteStop(id, index) {
            let stops = [...trips[currentIdx].stops];
            stops.splice(index, 1);
            await saveList(id, 'stops', stops, false);
        }

        async function addShop(id) {
            let t = trips[currentIdx];
            let list = [...t.shop_list];
            list.push({ store: "", item: "", qty: 1, price: 0, note: "" });
            await saveList(id, 'shop_list', list);
        }

        async function deleteShop(id, index) {
            let list = [...trips[currentIdx].shop_list];
            list.splice(index, 1);
            await saveList(id, 'shop_list', list);
        }

        loadData();
    </script>
</body>
</html>
