<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 旅遊計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; padding-bottom: 60px; }
        .info-box { border-radius: 16px; padding: 18px; border: 2.5px solid; flex: 1; }
        .dest-box { border-color: #BFDBFE; background: #EFF6FF; }
        .hotel-box { border-color: #FED7AA; background: #FFF7ED; }
        input, textarea { background: transparent; border: none; outline: none; width: 100%; }
        .nav-active { background: #1E293B; color: white; border-radius: 12px; font-weight: bold; padding: 8px 24px; }
        .nav-inactive { color: #94A3B8; font-weight: bold; padding: 8px 24px; cursor: pointer; }
        .shop-table th { font-size: 13px; color: #64748B; padding: 12px; text-align: left; border-bottom: 2px solid #E2E8F0; }
        .shop-table td { padding: 10px; border-bottom: 1px solid #F1F5F9; }
        .map-btn { color: #3B82F6; cursor: pointer; }
        .del-btn { color: #CBD5E1; cursor: pointer; }
        /* 權限提示樣式 */
        .auth-locked { border: 2px solid #EF4444 !important; background: #FEF2F2 !important; }
    </style>
</head>
<body class="max-w-4xl mx-auto py-8 px-4">

    <div class="mb-6 flex justify-end items-center gap-3">
        <span class="text-xs font-bold text-slate-400">編輯權限：</span>
        <input type="password" id="admin-pass" placeholder="輸入密碼解鎖編輯" 
            class="w-40 border-b-2 border-slate-200 focus:border-blue-500 text-sm px-2 py-1 text-center">
    </div>

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black italic underline decoration-blue-500">2026 TRAVEL PLAN</h1>
        <div class="flex gap-2">
            <button onclick="checkAuth(() => addNewDay())" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold shadow-lg">+ 新增天數</button>
            <button onclick="checkAuth(() => deleteCurrentDay())" class="bg-red-100 text-red-600 px-4 py-2 rounded-full font-bold">🗑️ 刪除</button>
        </div>
    </div>

    <div id="day-nav" class="flex gap-2 mb-8 overflow-x-auto pb-2"></div>
    <main id="main-content">讀取中...</main>

    <script>
        const supabaseUrl = 'https://qmmtyfdidiecklhmpfbq.supabase.co';
        const supabaseKey = 'sb_publishable_jVcE6vMZzu1L24w6hOZYcw_QY6FqY4Z';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_PWD = "202604"; // 這裡設定你的權限密碼
        let trips = [];
        let currentIdx = 0;

        // 核心：檢查權限
        function checkAuth(callback) {
            const inputPwd = document.getElementById('admin-pass').value;
            if (inputPwd === ADMIN_PWD) {
                callback();
            } else {
                alert("⚠️ 權限不足！請輸入正確的編輯密碼。");
                document.getElementById('admin-pass').classList.add('auth-locked');
                setTimeout(() => document.getElementById('admin-pass').classList.remove('auth-locked'), 1000);
            }
        }

        async function loadData() {
            const { data } = await _supabase.from('trips').select('*').order('id', { ascending: true });
            trips = data || [];
            render();
        }

        async function updateFieldAuth(id, field, val) {
            const inputPwd = document.getElementById('admin-pass').value;
            if (inputPwd !== ADMIN_PWD) {
                loadData(); // 密碼錯誤，刷回原本資料
                return;
            }
            await _supabase.from('trips').update({ [field]: val }).eq('id', id);
        }

        async function saveListAuth(id, listName, listData, shouldSort = false) {
            const inputPwd = document.getElementById('admin-pass').value;
            if (inputPwd !== ADMIN_PWD) {
                alert("權限錯誤：無法儲存變更");
                loadData();
                return;
            }
            if (shouldSort && listName === 'stops') {
                listData.sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00"));
            }
            await _supabase.from('trips').update({ [listName]: listData }).eq('id', id);
            loadData();
        }

        function forceMap(val) {
            if(!val || val.trim() === "") return;
            window.open(`https://www.google.com/maps/search/${encodeURIComponent(val)}`, '_blank');
        }

        async function addNewDay() {
            await _supabase.from('trips').insert([{ day: `Day ${trips.length + 1}`, stops: [], shop_list: [] }]);
            loadData();
        }

        async function deleteCurrentDay() {
            const t = trips[currentIdx];
            if (!confirm(`確定要刪除「${t.day}」嗎？`)) return;
            await _supabase.from('trips').delete().eq('id', t.id);
            currentIdx = 0;
            loadData();
        }

        function render() {
            const nav = document.getElementById('day-nav');
            const content = document.getElementById('main-content');
            if (trips.length === 0) {
                content.innerHTML = "尚未建立行程。";
                return;
            }

            nav.innerHTML = trips.map((t, i) => `
                <button onclick="currentIdx=${i}; render();" class="${i === currentIdx ? 'nav-active' : 'nav-inactive'}">
                    ${t.day || 'Day'}
                </button>
            `).join('');

            const t = trips[currentIdx];
            const stops = Array.isArray(t.stops) ? t.stops : [];
            const shops = Array.isArray(t.shop_list) ? t.shop_list : [];

            content.innerHTML = `
                <div class="mb-8">
                    <div class="flex justify-between items-end mb-4">
                        <input class="text-4xl font-black w-1/2" value="${t.day || ''}" 
                            onblur="updateFieldAuth(${t.id}, 'day', this.value)">
                        <input type="date" value="${t.date || ''}" 
                            onchange="updateFieldAuth(${t.id}, 'date', this.value)" class="font-bold text-slate-400">
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="info-box dest-box">
                            <span class="text-xs font-black text-blue-500 block mb-1">📍 目的地</span>
                            <div class="flex items-center gap-2">
                                <input id="dest-${t.id}" class="text-xl font-bold" value="${t.dest || ''}" 
                                    onblur="updateFieldAuth(${t.id}, 'dest', this.value)" placeholder="城市">
                                <button onclick="forceMap(document.getElementById('dest-${t.id}').value)" class="map-btn"><i class="fas fa-location-arrow"></i></button>
                            </div>
                        </div>
                        <div class="info-box hotel-box">
                            <span class="text-xs font-black text-orange-500 block mb-1">🏨 住宿</span>
                            <div class="flex items-center gap-2">
                                <input id="hotel-${t.id}" class="text-xl font-bold" value="${t.hotel || ''}" 
                                    onblur="updateFieldAuth(${t.id}, 'hotel', this.value)" placeholder="飯店">
                                <button onclick="forceMap(document.getElementById('hotel-${t.id}').value)" class="map-btn text-orange-500"><i class="fas fa-hotel"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h3 class="text-sm font-black text-slate-300 italic">Itinerary 行程</h3>
                        <button onclick="checkAuth(() => addStop(${t.id}))" class="text-blue-600 font-bold">+ 新增景點</button>
                    </div>
                    <div class="space-y-6">
                        ${stops.map((s, i) => `
                            <div class="relative pl-6 border-l-4 border-blue-100">
                                <div class="flex items-center gap-4 mb-2">
                                    <input type="time" class="w-32 font-black text-blue-600 text-lg" value="${s.time || '09:00'}" 
                                        onblur="stops[${i}].time=this.value; saveListAuth(${t.id}, 'stops', stops, true)">
                                    <input id="stop-${i}" class="text-xl font-black flex-1" value="${s.place || ''}" 
                                        onblur="stops[${i}].place=this.value; saveListAuth(${t.id}, 'stops', stops, false)">
                                    <div class="flex gap-4">
                                        <button onclick="forceMap(document.getElementById('stop-${i}').value)" class="map-btn text-blue-300"><i class="fas fa-map-marked-alt text-xl"></i></button>
                                        <button onclick="checkAuth(() => deleteStop(${t.id}, ${i}))" class="del-btn"><i class="fas fa-trash-can"></i></button>
                                    </div>
                                </div>
                                <textarea rows="2" class="text-sm text-slate-400 bg-white p-2 rounded-lg border border-slate-100" 
                                    onblur="stops[${i}].note=this.value; saveListAuth(${t.id}, 'stops', stops, false)">${s.note || ''}</textarea>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 shadow-sm overflow-x-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-black text-orange-500 italic">Shopping 購物</h3>
                        <button onclick="checkAuth(() => addShop(${t.id}))" class="bg-orange-500 text-white px-4 py-1.5 rounded-full text-xs font-bold">+ 新增</button>
                    </div>
                    <table class="w-full shop-table min-w-[600px]">
                        <thead><tr><th>地區</th><th>物品</th><th width="60">量</th><th width="100">價格</th><th>備註</th><th width="50"></th></tr></thead>
                        <tbody>
                            ${shops.map((item, i) => `
                                <tr>
                                    <td><input class="text-slate-400 text-sm" value="${item.store || ''}" onblur="shops[${i}].store=this.value; saveListAuth(${t.id}, 'shop_list', shops)"></td>
                                    <td><input class="font-bold border-b border-slate-100" value="${item.item || ''}" onblur="shops[${i}].item=this.value; saveListAuth(${t.id}, 'shop_list', shops)"></td>
                                    <td><input type="number" class="text-center" value="${item.qty || 1}" onblur="shops[${i}].qty=this.value; saveListAuth(${t.id}, 'shop_list', shops)"></td>
                                    <td><input type="number" class="text-blue-600 font-bold" value="${item.price || 0}" onblur="shops[${i}].price=this.value; saveListAuth(${t.id}, 'shop_list', shops)"></td>
                                    <td><input class="text-xs text-slate-400" value="${item.note || ''}" onblur="shops[${i}].note=this.value; saveListAuth(${t.id}, 'shop_list', shops)"></td>
                                    <td class="text-center"><button onclick="checkAuth(() => deleteShop(${t.id}, ${i}))" class="del-btn text-xl"><i class="fas fa-circle-xmark"></i></button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function addStop(id) {
            let t = trips[currentIdx];
            let stops = [...t.stops];
            stops.push({ time: "09:00", place: "", note: "" });
            await saveListAuth(id, 'stops', stops, false);
        }

        async function deleteStop(id, index) {
            let stops = [...trips[currentIdx].stops];
            stops.splice(index, 1);
            await saveListAuth(id, 'stops', stops, false);
        }

        async function addShop(id) {
            let t = trips[currentIdx];
            let list = [...t.shop_list];
            list.push({ store: "", item: "", qty: 1, price: 0, note: "" });
            await saveListAuth(id, 'shop_list', list);
        }

        async function deleteShop(id, index) {
            let list = [...trips[currentIdx].shop_list];
            list.splice(index, 1);
            await saveListAuth(id, 'shop_list', list);
        }

        loadData();
    </script>
</body>
</html>
