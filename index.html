<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 旅遊計畫 - 終極穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; padding-bottom: 60px; }
        .info-box { border-radius: 16px; padding: 18px; border: 2.5px solid; flex: 1; }
        .dest-box { border-color: #BFDBFE; background: #EFF6FF; }
        .hotel-box { border-color: #FED7AA; background: #FFF7ED; }
        input, textarea { background: transparent; border: none; outline: none; width: 100%; }
        .time-wrapper { width: 145px; min-width: 145px; display: flex; align-items: center; gap: 8px; }
        .time-input { font-weight: 900; color: #2563EB; font-size: 1.1rem; }
        .nav-active { background: #1E293B; color: white; border-radius: 12px; font-weight: bold; padding: 8px 24px; }
        .nav-inactive { color: #94A3B8; font-weight: bold; padding: 8px 24px; }
        .shop-table th { font-size: 13px; color: #64748B; padding: 12px; text-align: left; border-bottom: 2px solid #E2E8F0; }
        .shop-table td { padding: 10px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
        .map-btn { color: #3B82F6; cursor: pointer; transition: all 0.2s; }
        .map-btn:hover { color: #1D4ED8; transform: scale(1.2); }
        .del-btn { color: #CBD5E1; cursor: pointer; }
        .del-btn:hover { color: #EF4444; }
    </style>
</head>
<body class="max-w-4xl mx-auto py-8 px-4">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black italic underline decoration-blue-500">2026 TRAVEL PLAN</h1>
        <button onclick="addNewDay()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">+ 新增天數</button>
    </div>

    <div id="day-nav" class="flex gap-2 mb-8 overflow-x-auto pb-2"></div>
    <main id="main-content">載入中...</main>

    <script>
        const supabaseUrl = 'https://qmmtyfdidiecklhmpfbq.supabase.co';
        const supabaseKey = 'sb_publishable_jVcE6vMZzu1L24w6hOZYcw_QY6FqY4Z';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let trips = [];
        let currentIdx = 0;

        async function loadData() {
            try {
                const { data, error } = await _supabase.from('trips').select('*').order('id', { ascending: true });
                if (error) throw error;
                trips = data || [];
                // 排序邏輯
                trips.forEach(t => {
                    if (t.stops && Array.isArray(t.stops)) {
                        t.stops.sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00"));
                    }
                });
                render();
            } catch (err) {
                console.error("資料載入出錯:", err);
                document.getElementById('main-content').innerHTML = "資料載入失敗，請檢查網路或資料庫設定。";
            }
        }

        async function updateField(id, field, val) {
            await _supabase.from('trips').update({ [field]: val }).eq('id', id);
        }

        async function saveList(id, listName, listData) {
            if (listName === 'stops') {
                listData.sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00"));
            }
            await _supabase.from('trips').update({ [listName]: listData }).eq('id', id);
            loadData(); // 儲存後強制重新整理確保排序顯示
        }

        function forceMap(val) {
            if(!val || val.trim() === "") return;
            window.open(`https://www.google.com/maps/search/${encodeURIComponent(val)}`, '_blank');
        }

        async function addNewDay() {
            await _supabase.from('trips').insert([{ day: `Day ${trips.length + 1}`, stops: [], shop_list: [] }]);
            loadData();
        }

        function render() {
            const nav = document.getElementById('day-nav');
            const content = document.getElementById('main-content');
            if (trips.length === 0) {
                content.innerHTML = "目前沒有天數，請點擊上方按鈕新增。";
                return;
            }

            nav.innerHTML = trips.map((t, i) => `
                <button onclick="currentIdx=${i}; render();" class="${i === currentIdx ? 'nav-active' : 'nav-inactive'}">
                    ${t.day || '未命名'}
                </button>
            `).join('');

            const t = trips[currentIdx];
            const stops = Array.isArray(t.stops) ? t.stops : [];
            const shops = Array.isArray(t.shop_list) ? t.shop_list : [];

            content.innerHTML = `
                <div class="mb-8">
                    <div class="flex justify-between items-end mb-4">
                        <input class="text-4xl font-black w-1/2" value="${t.day || ''}" onblur="updateField(${t.id}, 'day', this.value)">
                        <input type="date" value="${t.date || ''}" onchange="updateField(${t.id}, 'date', this.value)" class="font-bold text-slate-400">
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="info-box dest-box">
                            <span class="text-xs font-black text-blue-500 uppercase block mb-1">📍 目的地</span>
                            <div class="flex items-center gap-2">
                                <input id="dest-${t.id}" class="text-xl font-bold" value="${t.dest || ''}" onblur="updateField(${t.id}, 'dest', this.value)" placeholder="輸入地點">
                                <button onclick="forceMap(document.getElementById('dest-${t.id}').value)" class="map-btn"><i class="fas fa-location-arrow text-xl"></i></button>
                            </div>
                        </div>
                        <div class="info-box hotel-box">
                            <span class="text-xs font-black text-orange-500 uppercase block mb-1">🏨 住宿飯店</span>
                            <div class="flex items-center gap-2">
                                <input id="hotel-${t.id}" class="text-xl font-bold" value="${t.hotel || ''}" onblur="updateField(${t.id}, 'hotel', this.value)" placeholder="飯店名稱">
                                <button onclick="forceMap(document.getElementById('hotel-${t.id}').value)" class="map-btn" style="color:#F97316"><i class="fas fa-hotel text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h3 class="text-sm font-black text-slate-300 italic uppercase">Itinerary 行程 (自動排序)</h3>
                        <button onclick="addStop(${t.id})" class="text-blue-600 font-bold">+ 新增景點</button>
                    </div>
                    <div class="space-y-6">
                        ${stops.map((s, i) => `
                            <div class="relative pl-6 border-l-4 border-blue-100">
                                <div class="flex items-center gap-4 mb-2">
                                    <div class="time-wrapper">
                                        <input type="time" class="time-input" value="${s.time || '09:00'}" 
                                            onblur="stops[${i}].time=this.value; saveList(${t.id}, 'stops', stops)">
                                        <i class="far fa-clock text-blue-300"></i>
                                    </div>
                                    <input id="stop-${i}" class="text-xl font-black flex-1" value="${s.place || ''}" 
                                        onblur="stops[${i}].place=this.value; saveList(${t.id}, 'stops', stops)" placeholder="景點名稱">
                                    <div class="flex gap-4">
                                        <button onclick="forceMap(document.getElementById('stop-${i}').value)" class="map-btn text-blue-300"><i class="fas fa-map-marked-alt text-xl"></i></button>
                                        <button onclick="if(confirm('刪除？')){stops.splice(${i},1); saveList(${t.id}, 'stops', stops);}" class="del-btn"><i class="fas fa-trash-can text-lg"></i></button>
                                    </div>
                                </div>
                                <textarea rows="2" class="text-sm text-slate-400 bg-white p-3 rounded-xl border border-slate-100" 
                                    onblur="stops[${i}].note=this.value; saveList(${t.id}, 'stops', stops)" placeholder="行程備註...">${s.note || ''}</textarea>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 shadow-sm overflow-x-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-black text-orange-500 italic uppercase">🛍️ Shopping 購物清單</h3>
                        <button onclick="addShop(${t.id})" class="bg-orange-500 text-white px-4 py-1.5 rounded-full text-xs font-bold">+ 新增物品</button>
                    </div>
                    <table class="w-full shop-table min-w-[650px]">
                        <thead>
                            <tr><th width="160">商店地區</th><th>購買物品</th><th width="60">量</th><th width="100">價格</th><th>備註</th><th width="50"></th></tr>
                        </thead>
                        <tbody>
                            ${shops.map((item, i) => `
                                <tr>
                                    <td>
                                        <div class="flex items-center gap-1 border-b border-slate-100">
                                            <input id="shop-loc-${i}" class="text-slate-400 text-sm" value="${item.store || ''}" 
                                                onblur="shops[${i}].store=this.value; saveList(${t.id}, 'shop_list', shops)" placeholder="地區">
                                            <button onclick="forceMap(document.getElementById('shop-loc-${i}').value)" class="map-btn text-xs text-blue-300"><i class="fas fa-map-marker-alt"></i></button>
                                        </div>
                                    </td>
                                    <td><input class="font-bold border-b border-slate-100" value="${item.item || ''}" onblur="shops[${i}].item=this.value; saveList(${t.id}, 'shop_list', shops)"></td>
                                    <td><input type="number" class="text-center font-bold" value="${item.qty || 1}" onblur="shops[${i}].qty=this.value; saveList(${t.id}, 'shop_list', shops)"></td>
                                    <td><input type="number" class="text-blue-600 font-bold" value="${item.price || 0}" onblur="shops[${i}].price=this.value; saveList(${t.id}, 'shop_list', shops)"></td>
                                    <td><input class="text-xs text-slate-400" value="${item.note || ''}" onblur="shops[${i}].note=this.value; saveList(${t.id}, 'shop_list', shops)"></td>
                                    <td class="text-center">
                                        <button onclick="if(confirm('刪除？')){shops.splice(${i},1); saveList(${t.id}, 'shop_list', shops);}" class="del-btn text-xl"><i class="fas fa-circle-xmark"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function addStop(id) {
            let t = trips[currentIdx];
            let stops = Array.isArray(t.stops) ? t.stops : [];
            stops.push({ time: "09:00", place: "", note: "" });
            await saveList(id, 'stops', stops);
        }

        async function addShop(id) {
            let t = trips[currentIdx];
            let list = Array.isArray(t.shop_list) ? t.shop_list : [];
            list.push({ store: "", item: "", qty: 1, price: 0, note: "" });
            await saveList(id, 'shop_list', list);
        }

        loadData();
    </script>
</body>
</html>
